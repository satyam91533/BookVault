<html>

<head>

<title>
{{ purchase.book.title }}
</title>

<script
src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js">
</script>

<style>

body{
    margin:0;
    background:#0f172a;
    color:white;
    font-family:Arial;
}

.topbar{
    width:100%;
    background:#1e293b;
    padding:15px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
}

button{
    padding:10px 18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

.reader{
    width:100%;
    text-align:center;
    margin-top:20px;
}

canvas{
    max-width:100%;
    border-radius:12px;
}

.controls{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
}

</style>

</head>

<body>

<div class="topbar">

    <h2>
        {{ purchase.book.title }}
    </h2>

    <div class="controls">

        <button onclick="prevPage()">
            Prev
        </button>

        <button onclick="nextPage()">
            Next
        </button>

        <button onclick="zoomIn()">
            Zoom +
        </button>

        <button onclick="zoomOut()">
            Zoom -
        </button>

        <button onclick="toggleDarkMode()">
            Dark Mode
        </button>

    </div>

</div>

<div class="reader">

    <canvas id="pdf-render"></canvas>

</div>

<script>

    pdfjsLib.GlobalWorkerOptions.workerSrc =
    'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.worker.min.js';

const url = "{{ purchase.book.pdf_file|safe}}";

let pdfDoc = null,
    pageNum = 1,
    scale = 1.2,
    canvas = document.getElementById('pdf-render'),
    ctx = canvas.getContext('2d');

pdfjsLib.getDocument(url).promise.then(pdf => {

    pdfDoc = pdf;

    renderPage(pageNum);

});

function renderPage(num){

    pdfDoc.getPage(num).then(page => {

        const viewport = page.getViewport({
            scale: scale
        });

        canvas.height = viewport.height;

        canvas.width = viewport.width;

        const renderContext = {
            canvasContext: ctx,
            viewport: viewport
        };

        page.render(renderContext);

    });

}

function prevPage(){

    if(pageNum <= 1) return;

    pageNum--;

    renderPage(pageNum);

}

function nextPage(){

    if(pageNum >= pdfDoc.numPages) return;

    pageNum++;

    renderPage(pageNum);

}

function zoomIn(){

    scale += 0.2;

    renderPage(pageNum);

}

function zoomOut(){

    if(scale <= 0.6) return;

    scale -= 0.2;

    renderPage(pageNum);

}

function toggleDarkMode(){

    if(document.body.style.background == 'white'){

        document.body.style.background = '#0f172a';

        document.body.style.color = 'white';

    }

    else{

        document.body.style.background = 'white';

        document.body.style.color = 'black';

    }

}

</script>

</body>

</html>
