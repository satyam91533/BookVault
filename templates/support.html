<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Support
    </title>

    <style>

        body{
            margin:0;
            padding:0;
            background:#0f172a;
            font-family:Arial, sans-serif;
            color:white;
        }

        .container{
            width:90%;
            max-width:700px;
            margin:50px auto;
            background:#1e293b;
            padding:40px;
            border-radius:20px;
        }

        h1{
            text-align:center;
            margin-bottom:30px;
        }

        input,
        textarea,
        select{
            width:100%;
            padding:15px;
            margin-top:15px;
            border:none;
            border-radius:10px;
            background:#334155;
            color:white;
            font-size:16px;
        }

        textarea{
            height:150px;
            resize:none;
        }

        button{
            width:100%;
            padding:15px;
            margin-top:25px;
            border:none;
            border-radius:10px;
            background:#f59e0b;
            color:black;
            font-size:18px;
            font-weight:bold;
            cursor:pointer;
        }

        .success{
            background:#14532d;
            padding:15px;
            border-radius:10px;
            margin-bottom:20px;
            text-align:center;
        }

    </style>

</head>

<body>

    <div style="
    position:absolute;
    top:20px;
    left:20px;
    z-index:999;
    ">

    <a href="javascript:history.back()"
       style="
       display:inline-block;
       background:#f59e0b;
       color:black;
       padding:10px 18px;
       border-radius:10px;
       text-decoration:none;
       font-weight:bold;
       ">

       ← Back

    </a>

    </div>
    
    <div class="container">

        <h1>
            Contact Support
        </h1>

        {% if success %}

        <div class="success">
            Support message sent successfully.
        </div>

        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <input type="text"
                   name="name"
                   placeholder="Your Name"
                   required>

            <input type="email"
                   name="email"
                   placeholder="Your Email"
                   required>

            <select name="user_type"
                    required>

                <option value="">
                    Select User Type
                </option>

                <option value="Buyer">
                    Buyer
                </option>

                <option value="Seller">
                    Seller
                </option>

            </select>

            <input type="text"
                   name="subject"
                   placeholder="Subject"
                   required>

            <textarea name="message"
                      placeholder="Write your issue..."
                      required></textarea>

            <button type="submit">
                Send Message
            </button>

        </form>

    </div>

</body>

</html>
