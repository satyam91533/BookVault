<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Edit Book</title>

    <style>

        body{
            background:#0f172a;
            font-family:Arial, sans-serif;
            margin:0;
            padding:40px;
            color:white;
        }

        .box{
            background:#1e293b;
            max-width:700px;
            margin:auto;
            padding:40px;
            border-radius:15px;
        }

        h1{
            text-align:center;
            color:#3b82f6;
            margin-bottom:30px;
        }

        input,
        select,
        textarea{
            width:100%;
            padding:15px;
            margin-top:15px;
            border:none;
            border-radius:10px;
            font-size:16px;
        }

        button{
            width:100%;
            margin-top:20px;
            padding:15px;
            background:#3b82f6;
            color:white;
            border:none;
            border-radius:10px;
            font-size:18px;
            cursor:pointer;
        }

        img{
            width:150px;
            height:220px;
            object-fit:cover;
            border-radius:10px;
            margin-top:20px;
        }

    </style>

</head>

<body>

    <div class="box">

        <h1>
            Edit Book
        </h1>

        <form method="POST"
              enctype="multipart/form-data">

            {% csrf_token %}

            <input
                type="text"
                name="title"
                value="{{ book.title }}"
                placeholder="Book Title">

            <select name="category">

                <option value="{{ book.category }}">
                    {{ book.category }}
                </option>

                <option value="Programming">
                    Programming
                </option>

                <option value="AI & ML">
                    AI & ML
                </option>

                <option value="Business">
                    Business
                </option>

                <option value="Finance">
                    Finance
                </option>

                <option value="Education">
                    Education
                </option>

                <option value="Motivation">
                    Motivation
                </option>

            </select>

            <input
                type="text"
                name="price"
                value="{{ book.price }}"
                placeholder="Book Price">

            <textarea
                name="description"
                style="height:150px;">{{ book.description }}</textarea>

            <p>
                Current Cover:
            </p>

            <img src="{{ book.cover_image.url }}">

            <input
                type="file"
                name="cover_image">

            <input
                type="file"
                name="pdf_file">

            <button type="submit">
                Update Book
            </button>

        </form>

    </div>

</body>

</html>
