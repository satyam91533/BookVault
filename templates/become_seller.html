<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Become Seller</title>

    <style>

        body{
            margin:0;
            padding:0;
            background:#0f172a;
            font-family:Arial, sans-serif;
            color:white;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .box{
            background:#1e293b;
            padding:50px;
            border-radius:20px;
            text-align:center;
            width:400px;
        }

        h1{
            color:#f59e0b;
            margin-bottom:20px;
        }

        p{
            color:#cbd5e1;
            margin-bottom:35px;
        }

        .btn{
            display:block;
            text-decoration:none;
            padding:15px;
            margin-top:20px;
            border-radius:10px;
            font-weight:bold;
            transition:0.3s;
        }

        .login-btn{
            background:#22c55e;
            color:white;
        }

        .signup-btn{
            background:#f59e0b;
            color:black;
        }

        .btn:hover{
            transform:scale(1.03);
        }

    </style>

</head>

<body>

    <div class="box">

        <h1>
            Seller Portal
        </h1>

        <p>
            Start selling your ebooks and manage your business professionally.
        </p>

        <a href="/seller-login/"
           class="btn login-btn">
            Already Seller Login
        </a>

        <a href="/seller-signup/"
           class="btn signup-btn">
            Become Seller
        </a>

    </div>

</body>

</html>
