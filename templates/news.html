<!DOCTYPE html>
<html>

<head>

    <title>
        Latest News | BookVault
    </title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#0f172a;
            color:white;
            font-family:Arial,sans-serif;
        }

        .navbar{
            width:100%;
            padding:20px 8%;
            background:#1e293b;
            display:flex;
            justify-content:space-between;
            align-items:center;
            flex-wrap:wrap;
        }

        .logo{
            font-size:32px;
            color:#f59e0b;
            font-weight:bold;
            text-decoration:none;
        }

        .nav-links{
            display:flex;
            gap:20px;
            flex-wrap:wrap;
        }

        .nav-links a{
            color:white;
            text-decoration:none;
            transition:0.3s;
        }

        .nav-links a:hover{
            color:#f59e0b;
        }

        .hero{
            text-align:center;
            padding:80px 20px;
        }

        .hero h1{
            font-size:60px;
            margin-bottom:20px;
        }

        .hero p{
            color:#cbd5e1;
            font-size:20px;
        }

        .news-container{
            width:90%;
            margin:auto;
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
            gap:35px;
            padding-bottom:80px;
        }

        .news-card{
            background:#1e293b;
            border-radius:25px;
            overflow:hidden;
            transition:0.3s;
            box-shadow:0 0 20px rgba(0,0,0,0.3);
        }

        .news-card:hover{
            transform:translateY(-8px);
        }

        .news-image{
            width:100%;
            height:220px;
            object-fit:cover;
        }

        .news-content{
            padding:25px;
        }

        .news-title{
            font-size:25px;
            line-height:1.5;
            margin-bottom:15px;
        }

        .news-source{
            color:#94a3b8;
            margin-bottom:20px;
        }

        .read-btn{
            display:inline-block;
            padding:12px 22px;
            background:#f59e0b;
            color:black;
            text-decoration:none;
            border-radius:12px;
            font-weight:bold;
            transition:0.3s;
        }

        .read-btn:hover{
            background:white;
        }

    </style>

</head>

<body>

    <div class="navbar">

        <a href="/"
           class="logo">

            BookVault

        </a>

        <div class="nav-links">

            <a href="/">
                Home
            </a>

            <a href="/explore-books/">
                Explore Books
            </a>

            <a href="/news/">
                News
            </a>

        </div>

    </div>

    <div class="hero">

        <h1>
            📰 Latest Articles & News
        </h1>

        <p>
            Discover trending book news, education updates and learning articles.
        </p>

    </div>

    <div class="news-container">

        {% for article in articles %}

        <div class="news-card">

            <img src="https://picsum.photos/600/400?random={{ forloop.counter }}"
                 class="news-image">

            <div class="news-content">

                <div class="news-title">
                    {{ article.title }}
                </div>

                <div class="news-source">
                    {{ article.published }}
                </div>

                <a href="{{ article.link }}"
                   target="_blank"
                   class="read-btn">

                    Read More

                </a>

            </div>

        </div>

        {% endfor %}

    </div>

</body>

</html>
