<!DOCTYPE html>
<html>

<head>

    <title>
        Upload Website Logo
    </title>

</head>

<body style="
background:#0f172a;
color:white;
font-family:Arial;
padding:40px;
">

    <h1>
        Upload Website Logo
    </h1>

    {% if settings_obj.site_logo %}

    <img src="{{ settings_obj.site_logo }}"
         style="
         width:140px;
         border-radius:15px;
         margin-bottom:20px;
         ">

    {% endif %}

    <form method="POST"
          enctype="multipart/form-data">

        {% csrf_token %}

        <input type="file"
               name="site_logo"
               required>

        <br><br>

        <button type="submit"
                style="
                padding:12px 20px;
                background:#22c55e;
                border:none;
                color:white;
                border-radius:10px;
                font-weight:bold;
                cursor:pointer;
                ">

            Upload Logo

        </button>

    </form>

</body>

</html>
