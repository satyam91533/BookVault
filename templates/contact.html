<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Contact BookVault</title>

    <style>

        body{
            margin:0;
            font-family:Arial, sans-serif;
            background:#0f172a;
            color:white;
        }

        .navbar{
            background:#111827;
            padding:20px 50px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .logo{
            font-size:32px;
            font-weight:bold;
            color:#f59e0b;
        }

        .menu a{
            color:white;
            text-decoration:none;
            margin-left:20px;
            font-size:18px;
        }

        .container{
            padding:80px 50px;
            max-width:800px;
            margin:auto;
        }

        h1{
            font-size:55px;
            margin-bottom:20px;
            text-align:center;
        }

        p{
            color:#cbd5e1;
            font-size:20px;
            text-align:center;
            margin-bottom:40px;
        }

        form{
            background:#1e293b;
            padding:40px;
            border-radius:15px;
        }

        input,
        textarea{
            width:100%;
            padding:15px;
            margin-top:15px;
            border:none;
            border-radius:10px;
            font-size:16px;
        }

        textarea{
            height:150px;
        }

        button{
            margin-top:20px;
            padding:15px 30px;
            background:#22c55e;
            color:white;
            border:none;
            border-radius:10px;
            font-size:18px;
            cursor:pointer;
        }

        .contact-info{
            margin-top:50px;
            text-align:center;
        }

        .contact-info h2{
            color:#f59e0b;
            margin-bottom:20px;
        }

        .contact-info p{
            margin:10px 0;
        }

    </style>

</head>

<body>

    <div class="navbar">

        <div class="logo">
            BookVault
        </div>

        <div class="menu">

            <a href="/">Home</a>

            <a href="/about/">About</a>

            <a href="/contact/">Contact</a>

        </div>

    </div>


    <div class="container">

        <h1>
            Contact Us
        </h1>

        <p>
            Need help? Send your query to BookVault support team.
        </p>

        <form>

            <input type="text"
                   placeholder="Your Name">

            <input type="email"
                   placeholder="Your Email">

            <textarea
                placeholder="Write your message..."></textarea>

            <button type="submit">
                Send Message
            </button>

        </form>


        <div class="contact-info">

            <h2>Support Details</h2>

            <p>
                📧 satyamkumardwivedi32@gmail.com
            </p>

            <p>
                📞 +91 9262246071
            </p>

        </div>

    </div>

</body>

</html>
