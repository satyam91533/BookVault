<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Seller Login</title>

    <style>

        body{
            background:#0f172a;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            margin:0;
            font-family:Arial, sans-serif;
        }

        .box{
            background:#1e293b;
            padding:40px;
            border-radius:15px;
            width:350px;
        }

        h1{
            text-align:center;
            color:#f59e0b;
            margin-bottom:30px;
        }

        input{
            width:100%;
            padding:14px;
            margin-bottom:20px;
            border:none;
            border-radius:10px;
            background:#0f172a;
            color:white;
        }

        button{
            width:100%;
            padding:14px;
            background:#22c55e;
            color:white;
            border:none;
            border-radius:10px;
            font-size:16px;
            font-weight:bold;
            cursor:pointer;
        }

        button:hover{
            background:#16a34a;
        }

        .error{
            background:#ef4444;
            padding:10px;
            border-radius:8px;
            margin-bottom:20px;
            text-align:center;
        }

    </style>

</head>

<body>

    <div class="box">

        <h1>
            Seller Login
        </h1>

        {% if error %}

        <div class="error">
            {{ error }}
        </div>

        {% endif %}

        <form method="POST">

            {% csrf_token %}

            <input type="text"
                   name="username"
                   placeholder="Username"
                   required>

            <input type="password"
                   name="password"
                   placeholder="Password"
                   required>

            <button type="submit">
                Login
            </button>

        </form>

    </div>

</body>

</html>
